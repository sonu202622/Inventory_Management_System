services:
  - type: web
    name: inventory-backend
    runtime: python
    repo: https://github.com/sonu202622/Inventory_Management_System.git
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://inventory-frontend.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_HOURS
        value: "24"

databases:
  - name: inventory-db
    plan: free
    region: frankfurt
    databaseName: inventory_db
    user: inventory_user
    ipAllowList: []
